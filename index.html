<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Dashboard</title>
    <!-- Essential Serif Font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Taskbar -->
    <nav class="taskbar">
        <div class="status-left">MODE: FOCUS</div>
        <div class="center-logo">THE ARCHIVE</div>
        <div id="live-clock" class="status-right">00:00</div>
    </nav>

    <div class="dashboard">
        <div class="focus-window">
            <h1 id="timer">25:00</h1>
            <p class="quote">"Deep work only."</p>
            
            <div class="timer-actions">
                <button onclick="startTimer()" id="playBtn">START</button>
                <button onclick="pauseTimer()">PAUSE</button>
                <button onclick="resetTimer()">RESET</button>
            </div>
        </div>
    </div>

    <!-- Bottom Sound Bar -->
    <div class="sound-bar">
        <span>AMBIENT SOUNDS:</span>
        <button id="rainBtn" onclick="toggleSound('rain')">RAIN</button>
        <button id="cafeBtn" onclick="toggleSound('cafe')">CAFE</button>
    </div>

    <!-- Audio Elements -->
    <audio id="snd-rain" loop src="https://www.soundjay.com/nature/sounds/rain-07.mp3"></audio>
    <audio id="snd-cafe" loop src="https://www.soundjay.com/ambient/sounds/boarding-area-1.mp3"></audio>

    <script>
        // 1. Live Clock
        function updateClock() {
            let now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 1000); updateClock();

        // 2. Timer Logic
        let secondsLeft = 1500;
        let countdown = null;

        function updateTimerText() {
            let m = Math.floor(secondsLeft / 60);
            let s = secondsLeft % 60;
            document.getElementById('timer').innerText = m + ":" + (s < 10 ? '0' + s : s);
        }

        function startTimer() {
            if (countdown) return;
            countdown = setInterval(() => {
                secondsLeft--;
                updateTimerText();
                if (secondsLeft <= 0) { clearInterval(countdown); alert("Break time!"); }
            }, 1000);
        }

        function pauseTimer() { clearInterval(countdown); countdown = null; }
        function resetTimer() { pauseTimer(); secondsLeft = 1500; updateTimerText(); }

        // 3. Sound Toggles
        function toggleSound(type) {
            let track = document.getElementById('snd-' + type);
            let btn = document.getElementById(type + 'Btn');
            if (track.paused) {
                track.play(); btn.classList.add('active');
            } else {
                track.pause(); btn.classList.remove('active');
            }
        }
    </script>
</body>
</html>
