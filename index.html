<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editorial Archive</title>
    <!-- Essential Serif & Clean Sans Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- FEATURE: Header Taskbar -->
    <header class="taskbar">
        <div class="nav-item">SESSIONS: <span id="count">0</span></div>
        <div class="nav-logo">THE ARCHIVE</div>
        <div id="live-clock" class="nav-item">00:00:00</div>
    </header>

    <main class="split-layout">
        <!-- FEATURE: Background Image (image.png) -->
        <div class="left-panel">
            <div class="fixed-image"></div>
        </div>

        <div class="right-panel">
            <section class="intro">
                <h1 id="main-title">Focusing.</h1>
                <!-- FEATURE: Goal Input -->
                <input type="text" id="goalInput" placeholder="What are you working on?" oninput="updateGoal()">
                <p class="quote">"Simplicity is the ultimate sophistication."</p>
            </section>

            <section class="timer-zone">
                <div class="timer-display" id="timer">25:00</div>
                <div class="actions">
                    <button onclick="startTimer()">START</button>
                    <button onclick="pauseTimer()">PAUSE</button>
                    <button class="finish-btn" onclick="finishSession()">FINISH</button>
                </div>
            </section>
        </div>
    </main>

    <!-- FEATURE: Footer Soundbar -->
    <footer class="soundbar">
        <div class="sound-controls">
            <span>AMBIENT:</span>
            <button id="btn-rain" onclick="toggleAudio('rain')">Rain</button>
            <button id="btn-cafe" onclick="toggleAudio('cafe')">Cafe</button>
        </div>
    </footer>

    <!-- Audio Elements -->
    <audio id="audio-rain" loop src="https://www.soundjay.com/nature/sounds/rain-07.mp3"></audio>
    <audio id="audio-cafe" loop src="https://www.soundjay.com/ambient/sounds/boarding-area-1.mp3"></audio>

    <script>
        // 1. Clock Logic
        const clock = document.getElementById('live-clock');
        setInterval(() => { clock.innerText = new Date().toLocaleTimeString(); }, 1000);

        // 2. Goal Update Logic
        function updateGoal() {
            const input = document.getElementById('goalInput').value;
            document.getElementById('main-title').innerText = input || "Focusing.";
        }

        // 3. Timer & Session Logic
        let time = 1500; let run = null; let sessions = 0;
        function startTimer() {
            if (run) return;
            run = setInterval(() => {
                time--;
                let m = Math.floor(time/60); let s = time%60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            }, 1000);
        }
        function pauseTimer() { clearInterval(run); run = null; }
        function finishSession() {
            sessions++;
            document.getElementById('count').innerText = sessions;
            pauseTimer(); time = 1500; document.getElementById('timer').innerText = "25:00";
            alert("Session archived.");
        }

        // 4. Audio Mixer Logic
        function toggleAudio(type) {
            const track = document.getElementById('audio-' + type);
            const btn = document.getElementById('btn-' + type);
            if (track.paused) { track.play(); btn.classList.add('active'); }
            else { track.pause(); btn.classList.remove('active'); }
        }
    </script>
</body>
</html>
